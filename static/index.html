<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #fafafa;
    }

    header span.tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: #27272a;
      color: #a1a1aa;
      font-weight: 500;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 72%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1c1c1e;
      border: 1px solid #27272a;
      border-bottom-left-radius: 0.25rem;
    }

    .msg.assistant.thinking {
      color: #71717a;
      font-style: italic;
    }

    .welcome {
      align-self: center;
      text-align: center;
      color: #71717a;
      margin-top: auto;
      margin-bottom: auto;
      padding: 2rem;
    }

    .welcome h2 {
      font-size: 1.25rem;
      color: #a1a1aa;
      margin-bottom: 0.5rem;
    }

    .welcome p { font-size: 0.85rem; line-height: 1.6; }

    form {
      padding: 1rem 1.5rem;
      border-top: 1px solid #27272a;
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #1c1c1e;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      color: #e4e4e7;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #52525b; }

    button {
      padding: 0.7rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #1e3a5f; cursor: not-allowed; }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>LangChain Chat</h1>
    <span class="tag">Claude Sonnet + Tools</span>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>Ask me anything</h2>
      <p>
        I can look up facts on Wikipedia and do math.<br />
        Try: "What is the population of Tokyo?" or "What's 1729^2?"
      </p>
    </div>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    let history = [];

    function addMessage(role, content, cls = "") {
      const welcome = chat.querySelector(".welcome");
      if (welcome) welcome.remove();

      const div = document.createElement("div");
      div.className = `msg ${role} ${cls}`.trim();
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addMessage("user", text);

      const thinking = addMessage("assistant", "Thinking...", "thinking");
      const btn = form.querySelector("button");
      btn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, history }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Request failed");
        }

        const data = await res.json();
        thinking.textContent = data.reply;
        thinking.classList.remove("thinking");

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });

        if (history.length > 20) history = history.slice(-20);
      } catch (err) {
        thinking.textContent = "Error: " + err.message;
        thinking.classList.remove("thinking");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
